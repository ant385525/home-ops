---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app dnscrypt-proxy
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  install:
    crds: CreateReplace
    timeout: 2m
    remediation:
      retries: 1
  upgrade:
    crds: CreateReplace
    timeout: 2m
    remediation:
      retries: 1
  values:
    controllers:
      main:
        pod:
          tolerations:
            - key: "location"
              operator: "Equal"
              value: "cloud"
              effect: "NoSchedule"
            - key: "location"
              operator: "Equal"
              value: "house"
              effect: "NoSchedule"
        strategy: RollingUpdate
        replicas: 2
        containers:
          *app :
            image:
              repository: ghcr.io/klutchell/dnscrypt-proxy
              tag: 2.1.11@sha256:25c3b516ef12db7af6d22f2496750c79dbebb57e9f1c2fce4bd667e5b08d625f
            resources:
              requests:
                cpu: 10m
                memory: 150Mi
              limits:
                memory: 2Gi
            securityContext:
              runAsUser: 65534
              runAsGroup: 65534
              runAsNonRoot: true
              allowPrivilegeEscalation: false
              seccompProfile: { type: RuntimeDefault }
              capabilities:
                drop:
                  - ALL
            probes:
              readiness: &probes
                enabled: true
                custom: true
                spec:
                  exec:
                    command:
                      - /usr/local/bin/dnsprobe
                      - google.com
                      - 127.0.0.1:5053
                  initialDelaySeconds: 10
                  timeoutSeconds: 5
                  periodSeconds: 10
                  failureThreshold: 10
              liveness: *probes
    service:
      *app :
        controller: main
        ports:
          dns-tcp:
            targetPort: &targetPort 5053
            port: &port 53
            protocol: TCP
          dns-udp:
            targetPort: *targetPort
            port: *port
            protocol: UDP
        clusterIP: 172.17.0.12
    persistence:
      config:
        type: configMap
        name: dnscrypt-proxy-config
        globalMounts:
          - path: /config/dnscrypt-proxy.toml
            subPath: config.toml
            readOnly: true
