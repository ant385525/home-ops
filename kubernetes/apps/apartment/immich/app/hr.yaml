---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app immich
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  install:
    crds: CreateReplace
    timeout: 2m
    remediation:
      retries: 1
  upgrade:
    crds: CreateReplace
    cleanupOnFail: true
    timeout: 2m
    remediation:
      retries: 1
  uninstall:
    keepHistory: false
  values:

    env:
      REDIS_HOSTNAME: dragonfly-db.database.svc.cluster.local
      REDIS_DBINDEX: 2
      IMMICH_LOG_LEVEL: debug
      DB_HOSTNAME:
        valueFrom:
          secretKeyRef:
            name: ${APP}-db-app
            key: host
      DB_USERNAME:
        valueFrom:
          secretKeyRef:
            name: ${APP}-db-app
            key: user
      DB_DATABASE_NAME:
        valueFrom:
          secretKeyRef:
            name: ${APP}-db-app
            key: dbname
      DB_PASSWORD:
        valueFrom:
          secretKeyRef:
            name: ${APP}-db-app
            key: password
    immich:
      metrics:
        enabled: true

      persistence:
        library:
          existingClaim: immich

      configuration:
        server:
          externalDomain: "https://immich.${SECRET_DOMAIN}"
        trash:
          enabled: true
          days: 30
        ffmpeg:
          preset: veryslow
          crf: 18
          bframes: -1
          refs: 0
          gopSize: 0
          twoPass: true
          preferredHwDevice: cuda
          accel: nvenc
          accelDecode: true
          tonemap: "reinhard"
          temporalAQ: true
          targetResolution: "1080"

        job:
          backgroundTask:
            concurrency: 10
          smartSearch:
            concurrency: 4
          metadataExtraction:
            concurrency: 10
          faceDetection:
            concurrency: 4
          search:
            concurrency: 10
          sidecar:
            concurrency: 10
          library:
            concurrency: 10
          migration:
            concurrency: 10
          thumbnailGeneration:
            concurrency: 6
          videoConversion:
            concurrency: 2
          notifications:
            concurrency: 10

        machineLearning:
          clip:
            modelName: &clip ViT-H-14-378-quickgelu__dfn5b
          facialRecognition:
            modelName: buffalo_l
            minFaces: 1
          duplicateDetection:
            enabled: true
            maxDistance: 0.001

        oauth:
          enabled: true
          issuerUrl: https://auth.${SECRET_DOMAIN}/application/o/immich/
          autoLaunch: false
          autoRegister: true
          buttonText: Login with Authentik
          clientId: ${CLIENT_ID}
          clientSecret: ${CLIENT_SECRET}

        storageTemplate:
          enabled: true
          hashVerificationEnabled: true
          template: "{{album}}/{{y}}/{{MM}}/{{filename}}"

        passwordLogin:
          enabled: false

        backup:
          database:
            enabled: false

      resources:
        limits:
          nvidia.com/gpu: 1

    redis:
      enabled: false

    server:
      nodeSelector: &nodeSelector
        kubernetes.io/hostname: "bonds"
      service:
        main:
          type: ClusterIP
      enabled: true
      runtimeClassName: nvidia
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000

      image:
        repository: ghcr.io/immich-app/immich-server
        tag: v1.129.0@sha256:7122354defac839a7ecf541395907c21805f6a2b60b67ee476e66b162f1a355d
        pullPolicy: IfNotPresent
      ingress:
        main:
          enabled: false
          ingressClassName: external
          annotations:
            nginx.ingress.kubernetes.io/proxy-request-buffering: "off"
            nginx.ingress.kubernetes.io/proxy-buffering: "off"
            nginx.ingress.kubernetes.io/proxy-body-size: "0"
            nginx.ingress.kubernetes.io/client-body-buffer-size: "8k"
            nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
            nginx.ingress.kubernetes.io/proxy-send-timeout: "600"
            external-dns.alpha.kubernetes.io/cloudflare-proxied: "false"
          hosts:
            - host: &fqdn immich.${SECRET_DOMAIN}
              paths:
                - path: /

      resources:
        requests:
          cpu: 500m
          memory: 500Mi
        limits:
          nvidia.com/gpu: 1
          memory: 6Gi

    machine-learning:
      nodeSelector: *nodeSelector
      enabled: true
      runtimeClassName: nvidia
      image:
        repository: ghcr.io/immich-app/immich-machine-learning
        tag: v1.130.3-cuda@sha256:4b9f9b45d657cdd944e66e50d5e31b922c30b67f05d5956cfa13a4888f711ca3
        pullPolicy: IfNotPresent
      env:
        MACHINE_LEARNING_ANN_TUNING_LEVEL: 3
        MACHINE_LEARNING_CACHE_FOLDER: /cache
        MACHINE_LEARNING_PRELOAD__CLIP__TEXTUAL: *clip
      persistence:
        cache:
          enabled: true
          type: pvc
          existingClaim: immich-ml-cache
      resources:
        requests:
          cpu: 500m
          memory: 500Mi
        limits:
          nvidia.com/gpu: 1
          memory: 8Gi
